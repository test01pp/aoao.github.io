<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人网址导航</title>
    <style>
/* ==================== 全局样式 ==================== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    /* 主色调 - 清新天蓝色 */
    --primary-color: #0ea5e9;
    --primary-dark: #0284c7;
    --secondary-color: #38bdf8;

    /* 背景色 */
    --bg-sidebar: #ffffff;
    --bg-sidebar-hover: #f0f9ff;
    --bg-sidebar-active: #e0f2fe;
    --bg-main: #f0f9ff;
    --bg-card: #ffffff;

    /* 文字颜色 */
    --text-primary: #0f172a;
    --text-secondary: #64748b;
    --text-sidebar: #334155;
    --text-sidebar-muted: #94a3b8;

    /* 边框和阴影 */
    --border-color: #e2e8f0;
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.08);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.08);
    --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);

    /* 侧边栏宽度 */
    --sidebar-width: 240px;
    --sidebar-collapsed-width: 0px;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: var(--bg-main);
    min-height: 100vh;
    overflow-x: hidden;
}

/* ==================== 左侧导航栏 ==================== */
.sidebar {
    width: var(--sidebar-width);
    height: 100%;
    background: var(--bg-sidebar);
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    transition: transform 0.3s ease;
    z-index: 1000;
    box-shadow: 1px 0 8px rgba(0, 0, 0, 0.06);
    border-right: 1px solid var(--border-color);
}

.sidebar-header {
    padding: 24px 20px;
    border-bottom: 1px solid var(--border-color);
}

.sidebar-header h2 {
    color: var(--text-primary);
    font-size: 1.4rem;
    font-weight: 600;
}

.sidebar-nav {
    flex: 1;
    overflow-y: auto;
    padding: 12px 0;
    min-height: 0;
}

.sidebar-nav::-webkit-scrollbar {
    width: 6px;
}

.sidebar-nav::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 3px;
}

.sidebar-nav ul {
    list-style: none;
}

.sidebar-nav li {
    margin: 2px 12px;
}

.nav-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    color: var(--text-sidebar);
    text-decoration: none;
    border-radius: 8px;
    transition: all 0.2s ease;
    font-size: 0.95rem;
}

.nav-link:hover {
    background: var(--bg-sidebar-hover);
    color: var(--primary-color);
}

.nav-link.active {
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    color: white;
    box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
}

.nav-icon {
    font-size: 1.3rem;
    width: 24px;
    text-align: center;
}

.nav-text {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border-color);
    text-align: center;
    flex-shrink: 0;
    margin-bottom: 8px;
}

.sidebar-footer p {
    color: var(--text-sidebar-muted);
    font-size: 0.85rem;
}

/* ==================== 主内容区 ==================== */
.main-content {
    flex: 1;
    margin-left: var(--sidebar-width);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: margin-left 0.3s ease;
    width: calc(100vw - var(--sidebar-width));
    max-width: 100%;
    overflow-x: hidden;
}

/* ==================== 顶部搜索栏 ==================== */
.top-header {
    background: white;
    padding: 16px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    box-shadow: var(--shadow-sm);
    position: fixed;
    top: 0;
    left: var(--sidebar-width);
    right: 0;
    z-index: 100;
    transition: left 0.3s ease;
}

.header-left {
    display: flex;
    align-items: center;
    gap: 16px;
}

.menu-toggle {
    display: none;
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: var(--text-primary);
    padding: 8px;
    border-radius: 6px;
    transition: background 0.2s;
}

.menu-toggle:hover {
    background: var(--bg-main);
}

.top-header h1 {
    font-size: 1.5rem;
    color: var(--text-primary);
    font-weight: 600;
}

.search-box {
    position: relative;
    max-width: 400px;
    flex: 1;
}

.search-box input {
    width: 100%;
    padding: 10px 16px 10px 42px;
    border: 2px solid var(--border-color);
    border-radius: 10px;
    font-size: 0.95rem;
    background: var(--bg-main);
    transition: all 0.2s ease;
}

.search-box input:focus {
    outline: none;
    border-color: var(--primary-color);
    background: white;
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
}

.search-box::before {
    content: "🔍";
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1rem;
}

/* ==================== 内容包装器 ==================== */
.content-wrapper {
    flex: 1;
    padding: 30px;
    padding-top: 90px;
}

/* ==================== 分类标题样式 ==================== */
.category {
    margin-bottom: 40px;
    scroll-margin-top: 80px;
}

.category-title {
    color: var(--text-primary);
    font-size: 1.4rem;
    margin-bottom: 20px;
    padding-left: 15px;
    border-left: 4px solid var(--primary-color);
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
}

.category-title .icon {
    font-size: 1.6rem;
}

/* ==================== 卡片网格布局 ==================== */
.card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(228px, 1fr));
    gap: 18px;
    width: 100%;
    max-width: 100%;
}

/* ==================== 卡片样式 ==================== */
.card {
    background: var(--bg-card);
    border-radius: 8px;
    padding: 8px 12px;
    box-shadow: var(--shadow-sm);
    transition: all 0.3s ease;
    cursor: pointer;
    text-decoration: none;
    display: block;
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border-color);
}

.card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
    transform: scaleX(0);
    transition: transform 0.3s ease;
}

.card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-lg);
    border-color: var(--primary-color);
}

.card:hover::before {
    transform: scaleX(1);
}

.card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
}

.card-icon {
    width: 32px;
    height: 32px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.95rem;
    background: var(--bg-main);
    color: white;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
}

.card-favicon {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    object-fit: contain;
}

.card-fallback {
    display: none;
}

.card-name {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.card-desc {
    color: var(--text-secondary);
    font-size: 0.85rem;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
    min-height: auto;
}

.card-link {
    color: var(--primary-color);
    font-size: 0.78rem;
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    opacity: 0.75;
}

/* ==================== 页脚样式 ==================== */
.footer {
    text-align: center;
    padding: 24px 30px;
    color: var(--text-secondary);
    font-size: 0.88rem;
    border-top: 1px solid var(--border-color);
    background: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
}

/* ==================== 无结果提示样式 ==================== */
.no-results {
    text-align: center;
    color: var(--text-secondary);
    padding: 60px 20px;
    font-size: 1.1rem;
    display: none;
}

.no-results.show {
    display: block;
}

/* ==================== 响应式设计 ==================== */
@media (max-width: 1024px) {
    .card-grid {
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    }
}

@media (max-width: 768px) {
    .sidebar {
        transform: translateX(-100%);
    }

    .sidebar.open {
        transform: translateX(0);
    }

    .main-content {
        margin-left: 0;
    }

    .menu-toggle {
        display: block;
    }

    .top-header {
        padding: 12px 16px;
        left: 0;
    }

    .top-header h1 {
        font-size: 1.2rem;
    }

    .search-box {
        max-width: none;
        order: 3;
        flex-basis: 100%;
        margin-top: 10px;
    }

    .manage-btn-top {
        order: 2;
        margin-left: auto;
        padding: 8px 16px;
        font-size: 0.85rem;
    }

    .content-wrapper {
        padding: 20px 16px;
        padding-top: 120px;
    }

    .category {
        margin-bottom: 30px;
    }

    .category-title {
        font-size: 1.2rem;
    }

    .card-grid {
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 14px;
    }

    .card {
        padding: 14px;
    }

    .footer {
        padding: 20px 16px;
        font-size: 0.82rem;
    }
}

@media (max-width: 480px) {
    .card-grid {
        grid-template-columns: 1fr;
        gap: 12px;
    }

    .top-header {
        flex-wrap: wrap;
    }

    .header-left h1 {
        display: none;
    }
}

.sidebar-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 999;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.sidebar-overlay.show {
    display: block;
    opacity: 1;
}

::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}

::-webkit-scrollbar-track {
    background: var(--bg-main);
}

::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
    background: #94a3b8;
}

html {
    scroll-behavior: smooth;
}

::selection {
    background: var(--primary-color);
    color: white;
}

.manage-btn-top {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    transition: all 0.3s ease;
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    margin-left: 12px;
    white-space: nowrap;
}

.manage-btn-top:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
}

.manage-btn-top:active {
    transform: translateY(0);
}

.modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    z-index: 9999;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(4px);
}

.modal-overlay.show {
    display: flex;
}

.modal {
    background: white;
    border-radius: 16px;
    width: 90%;
    max-width: 600px;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    animation: modalSlideIn 0.3s ease;
}

@keyframes modalSlideIn {
    from {
        opacity: 0;
        transform: translateY(-30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px;
    border-bottom: 1px solid #e2e8f0;
}

.modal-header h3 {

}

.modal-close {

    line-height: 1;
    transition: color 0.2s;
}

.modal-close:hover {

}

.modal-tabs {

.tab-btn {

    padding: 14px;

    border: none;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 600;
    color: #64748b;
    transition: all 0.2s;
    border-bottom: 3px solid transparent;

}

.tab-btn.active {
    color: #667eea;
    border-bottom-color: #667eea;
    background: rgba(102, 126, 234, 0.05);
}

.tab-content {

}

.tab-content.active {

}

.form-group {

}

.form-group label {

}

.form-group input,
.form-group select {

.tip {

// ==================== 图标加载功能 ====================

/**
 * 生成带首字母的彩色图标（Canvas）
 */
function generateLetterIcon(name, domain) {
    const canvas = document.createElement('canvas');
    canvas.width = 64;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');

    const colors = [
        '#6366f1', '#8b5cf6', '#ec4899', '#ef4444', '#f97316',
        '#eab308', '#22c55e', '#14b8a6', '#06b6d4', '#3b82f6',
        '#64748b', '#a855f7', '#d946ef', '#f43f5e', '#fb923c',
        '#84cc16', '#10b981', '#0ea5e9', '#7c3aed', '#e11d48'
    ];

    let hash = 0;
    for (let i = 0; i < domain.length; i++) {
        hash = domain.charCodeAt(i) + ((hash << 5) - hash);
    }
    const colorIndex = Math.abs(hash) % colors.length;
    const bgColor = colors[colorIndex];

    ctx.fillStyle = bgColor;
    roundRect(ctx, 0, 0, 64, 64, 14);
    ctx.fill();

    const letter = name.trim().charAt(0).toUpperCase();
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 30px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(letter, 32, 34);

    return canvas.toDataURL('image/png');
}

function roundRect(ctx, x, y, width, height, radius) {
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + width - radius, y);
    ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
    ctx.lineTo(x + width, y + height - radius);
    ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
    ctx.lineTo(x + radius, y + height);
    ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    ctx.closePath();
}

function initCardIcons() {
    const cardIcons = document.querySelectorAll('.card-icon');

    cardIcons.forEach(iconContainer => {
        const domain = iconContainer.getAttribute('data-domain');
        const img = iconContainer.querySelector('.card-favicon');
        const fallback = iconContainer.querySelector('.card-fallback');
        const card = iconContainer.closest('.card');
        const cardName = card ? card.getAttribute('data-name') : '';

        if (!domain || !img) return;

        const letterIcon = generateLetterIcon(cardName, domain);
        img.src = letterIcon;
        img.style.display = 'block';
        if (fallback) fallback.style.display = 'none';
    });
}

// ==================== 渲染页面 ====================

function renderPage() {
    const sidebarMenu = document.getElementById('sidebarMenu');
    const navigationContent = document.getElementById('navigationContent');
    const categoryCount = document.getElementById('categoryCount');

    // 渲染侧边栏
    sidebarMenu.innerHTML = NAV_DATA.map((category, index) => `
        <li>
            <a href="#category-${index + 1}" class="nav-link" data-target="category-${index + 1}">
                <span class="nav-icon">${category.icon}</span>
                <span class="nav-text">${category.category}</span>
            </a>
        </li>
    `).join('');

    // 渲染内容区
    navigationContent.innerHTML = NAV_DATA.map((category, index) => `
        <section class="category" id="category-${index + 1}" data-category="${category.category}">
            <h2 class="category-title">
                <span class="icon">${category.icon}</span>
                ${category.category}
            </h2>
            <div class="card-grid">
                ${category.links.map(link => `
                    <a href="${link.url}" target="_blank" class="card"
                       data-name="${escapeHtml(link.name)}"
                       data-desc="${escapeHtml(link.desc)}"
                       data-url="${escapeHtml(link.url)}">
                        <div class="card-header">
                            <div class="card-icon" data-domain="${getDomain(link.url)}">
                                <img class="card-favicon" src="" alt="${escapeHtml(link.name)}" loading="lazy" style="display:none;">
                                <span class="card-fallback"></span>
                            </div>
                            <div class="card-name">${escapeHtml(link.name)}</div>
                        </div>
                        <div class="card-desc">${escapeHtml(link.desc)}</div>
                        <div class="card-link">${escapeHtml(link.url)}</div>
                    </a>
                `).join('')}
            </div>
        </section>
    `).join('');

    // 更新分类数量
    categoryCount.textContent = `共 ${NAV_DATA.length} 个分类`;

    // 初始化图标
    initCardIcons();
}

// ==================== 辅助函数 ====================

function getDomain(url) {
    try {
        const urlObj = new URL(url);
        return urlObj.hostname;
    } catch (e) {
        return '';
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ==================== 侧边栏导航功能 ====================

function initSidebar() {
    const navLinks = document.querySelectorAll('.nav-link');
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');

    const overlay = document.createElement('div');
    overlay.className = 'sidebar-overlay';
    document.body.appendChild(overlay);

    navLinks.forEach(link => {
        link.addEventListener('click', function(e) {
            e.preventDefault();

            navLinks.forEach(l => l.classList.remove('active'));
            this.classList.add('active');

            const targetId = this.getAttribute('data-target');
            const targetElement = document.getElementById(targetId);

            if (targetElement) {
                targetElement.scrollIntoView({ behavior: 'smooth' });
            }

            if (window.innerWidth <= 768) {
                closeSidebar();
            }
        });
    });

    menuToggle.addEventListener('click', function() {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('show');
    });

    overlay.addEventListener('click', closeSidebar);

    function closeSidebar() {
        sidebar.classList.remove('open');
        overlay.classList.remove('show');
    }

    updateActiveNavOnScroll();
}

function updateActiveNavOnScroll() {
    const navLinks = document.querySelectorAll('.nav-link');
    const categories = document.querySelectorAll('.category');

    window.addEventListener('scroll', function() {
        let currentCategory = '';

        categories.forEach(category => {
            const categoryTop = category.offsetTop;
            const categoryHeight = category.offsetHeight;

            if (window.scrollY >= categoryTop - 150) {
                currentCategory = category.id;
            }
        });

        navLinks.forEach(link => {
            link.classList.remove('active');
            if (link.getAttribute('data-target') === currentCategory) {
                link.classList.add('active');
            }
        });
    });
}

// ==================== 搜索功能 ====================

function searchNavigation(keyword) {
    const categories = document.querySelectorAll('.category');
    let hasResults = false;

    if (!keyword || keyword.trim() === '') {
        categories.forEach(category => {
            category.style.display = 'block';
            const cards = category.querySelectorAll('.card');
            cards.forEach(card => {
                card.style.display = 'block';
            });
        });
        document.getElementById('noResults').classList.remove('show');
        return;
    }

    const lowerKeyword = keyword.toLowerCase().trim();

    categories.forEach(category => {
        const cards = category.querySelectorAll('.card');
        let categoryHasVisibleCards = false;

        cards.forEach(card => {
            const name = card.getAttribute('data-name').toLowerCase();
            const desc = card.getAttribute('data-desc').toLowerCase();
            const url = card.getAttribute('data-url').toLowerCase();

            if (name.includes(lowerKeyword) ||
                desc.includes(lowerKeyword) ||
                url.includes(lowerKeyword)) {
                card.style.display = 'block';
                categoryHasVisibleCards = true;
                hasResults = true;
            } else {
                card.style.display = 'none';
            }
        });

        category.style.display = categoryHasVisibleCards ? 'block' : 'none';
    });

    const noResultsElement = document.getElementById('noResults');
    if (hasResults) {
        noResultsElement.classList.remove('show');
    } else {
        noResultsElement.classList.add('show');
    }
}

// ==================== 事件监听 ====================

document.addEventListener('DOMContentLoaded', function() {
    renderPage();
    initSidebar();

    const searchInput = document.getElementById('searchInput');
    let searchTimeout;

    searchInput.addEventListener('input', function(e) {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            searchNavigation(e.target.value);
        }, 300);
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            searchInput.value = '';
            searchNavigation('');
            searchInput.blur();

            const sidebar = document.getElementById('sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            if (sidebar && overlay) {
                sidebar.classList.remove('open');
                overlay.classList.remove('show');
            }
        }
    });

    window.addEventListener('resize', function() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.querySelector('.sidebar-overlay');

        if (window.innerWidth > 768) {
            if (sidebar) sidebar.classList.remove('open');
            if (overlay) overlay.classList.remove('show');
        }
    });
});
    </script>
