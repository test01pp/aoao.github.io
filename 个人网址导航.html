
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人网址导航</title>
    <style>
/* ==================== 全局样式 ==================== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    -webkit-text-size-adjust: 100%; /* 防止移动端自动调整字体大小 */
    text-size-adjust: 100%;
}

:root {
    /* 主色调 - 清新天蓝色 */
    --primary-color: #0ea5e9;
    --primary-dark: #0284c7;
    --secondary-color: #38bdf8;

    /* 背景色 */
    --bg-sidebar: #ffffff;
    --bg-sidebar-hover: #f0f9ff;
    --bg-sidebar-active: #e0f2fe;
    --bg-main: #f0f9ff;
    --bg-card: #ffffff;

    /* 文字颜色 */
    --text-primary: #0f172a;
    --text-secondary: #64748b;
    --text-sidebar: #334155;
    --text-sidebar-muted: #94a3b8;

    /* 边框和阴影 */
    --border-color: #e2e8f0;
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.08);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.08);
    --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);

    /* 侧边栏宽度 */
    --sidebar-width: 240px;
    --sidebar-collapsed-width: 0px;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: var(--bg-main);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent; /* 移除移动端点击高亮 */
    -webkit-font-smoothing: antialiased; /* 字体平滑 */
    -moz-osx-font-smoothing: grayscale;
}

/* ==================== 左侧导航栏 ==================== */
.sidebar {
    width: var(--sidebar-width);
    height: 100%;
    background: var(--bg-sidebar);
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    transition: transform 0.3s ease;
    z-index: 1000;
    box-shadow: 1px 0 8px rgba(0, 0, 0, 0.06);
    border-right: 1px solid var(--border-color);
}

.sidebar-header {
    padding: 24px 20px;
    border-bottom: 1px solid var(--border-color);
}

.sidebar-header h2 {
    color: var(--text-primary);
    font-size: 1.4rem;
    font-weight: 600;
}

.sidebar-nav {
    flex: 1;
    overflow-y: auto;
    padding: 12px 0;
    min-height: 0;
    -webkit-overflow-scrolling: touch; /* iOS 平滑滚动 */
}

.sidebar-nav::-webkit-scrollbar {
    width: 6px;
}

.sidebar-nav::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 3px;
}

.sidebar-nav ul {
    list-style: none;
}

.sidebar-nav li {
    margin: 2px 12px;
}

.nav-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    color: var(--text-sidebar);
    text-decoration: none;
    border-radius: 8px;
    transition: all 0.2s ease;
    font-size: 0.95rem;
    -webkit-tap-highlight-color: transparent;
}

.nav-link:hover {
    background: var(--bg-sidebar-hover);
    color: var(--primary-color);
}

.nav-link.active {
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    color: white;
    box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
}

.nav-icon {
    font-size: 1.3rem;
    width: 24px;
    text-align: center;
}

.nav-text {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border-color);
    text-align: center;
    flex-shrink: 0;
    margin-bottom: 8px;
}

.sidebar-footer p {
    color: var(--text-sidebar-muted);
    font-size: 0.85rem;
}

/* ==================== 主内容区 ==================== */
.main-content {
    flex: 1;
    margin-left: var(--sidebar-width);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: margin-left 0.3s ease;
    width: calc(100vw - var(--sidebar-width));
    max-width: 100%;
    overflow-x: hidden;
}

/* ==================== 顶部搜索栏 ==================== */
.top-header {
    background: white;
    padding: 16px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    box-shadow: var(--shadow-sm);
    position: fixed;
    top: 0;
    left: var(--sidebar-width);  /* 使用 CSS 变量，与侧边栏宽度一致 */
    right: 0;
    z-index: 100;
    transition: left 0.3s ease;
}

.header-left {
    display: flex;
    align-items: center;
    gap: 16px;
}

.menu-toggle {
    display: none;
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: var(--text-primary);
    padding: 8px;
    border-radius: 6px;
    transition: background 0.2s;
    -webkit-tap-highlight-color: transparent;
    min-width: 44px; /* 最小触摸区域 */
    min-height: 44px;
}

.menu-toggle:hover {
    background: var(--bg-main);
}

.top-header h1 {
    font-size: 1.5rem;
    color: var(--text-primary);
    font-weight: 600;
}

.search-box {
    position: relative;
    max-width: 400px;
    flex: 1;
}

.search-box input {
    width: 100%;
    padding: 10px 16px 10px 42px;
    border: 2px solid var(--border-color);
    border-radius: 10px;
    font-size: 0.95rem;
    background: var(--bg-main);
    transition: all 0.2s ease;
}

.search-box input:focus {
    outline: none;
    border-color: var(--primary-color);
    background: white;
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
}

.search-box::before {
    content: "🔍";
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1rem;
}

/* ==================== 内容包装器 ==================== */
.content-wrapper {
    flex: 1;
    padding: 30px;
    padding-top: 90px; /* 为固定 header 留出空间 */
}

/* ==================== 分类标题样式 ==================== */
.category {
    margin-bottom: 40px;
    scroll-margin-top: 80px;
}

.category-title {
    color: var(--text-primary);
    font-size: 1.4rem;
    margin-bottom: 20px;
    padding-left: 15px;
    border-left: 4px solid var(--primary-color);
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
}

.category-title .icon {
    font-size: 1.6rem;
}

/* ==================== 卡片网格布局 ==================== */
.card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(228px, 1fr));
    gap: 18px;
    width: 100%;
    max-width: 100%;
}

/* ==================== 卡片样式 ==================== */
.card {
    background: var(--bg-card);
    border-radius: 8px;
    padding: 8px 12px;
    box-shadow: var(--shadow-sm);
    transition: all 0.3s ease;
    cursor: pointer;
    text-decoration: none;
    display: block;
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border-color);
    -webkit-tap-highlight-color: transparent;
}

.card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
    transform: scaleX(0);
    transition: transform 0.3s ease;
}

.card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-lg);
    border-color: var(--primary-color);
}

.card:hover::before {
    transform: scaleX(1);
}

.card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
}

.card-icon {
    width: 32px;
    height: 32px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.95rem;
    background: var(--bg-main);
    color: white;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
}

/* 网站真实图标 */
.card-favicon {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    object-fit: contain;
}

/* 降级 emoji 图标（隐藏状态） */
.card-fallback {
    display: none;
}


/* 卡片字体属性 */

.card-name {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.card-desc {
    color: var(--text-secondary);
    font-size: 0.85rem;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
    min-height: auto;
}

.card-link {
    color: var(--primary-color);
    font-size: 0.78rem;
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    opacity: 0.75;
}

/* ==================== 页脚样式 ==================== */
.footer {
    text-align: center;
    padding: 24px 30px;
    color: var(--text-secondary);
    font-size: 0.88rem;
    border-top: 1px solid var(--border-color);
    background: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
}

/* ==================== 无结果提示样式 ==================== */
.no-results {
    text-align: center;
    color: var(--text-secondary);
    padding: 60px 20px;
    font-size: 1.1rem;
    display: none;
}

.no-results.show {
    display: block;
}

/* ==================== 响应式设计 ==================== */

/* 平板设备 */
@media (max-width: 1024px) {
    .card-grid {
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    }
}

/* 手机设备 - 隐藏侧边栏 */
@media (max-width: 768px) {
    .sidebar {
        transform: translateX(-100%);
        width: 280px; /* 移动端侧边栏稍宽 */
    }

    .sidebar.open {
        transform: translateX(0);
        box-shadow: 2px 0 12px rgba(0, 0, 0, 0.15);
    }

    .main-content {
        margin-left: 0;
        width: 100vw;
    }

    .menu-toggle {
        display: block;
        padding: 10px;
        font-size: 1.6rem;
    }

    .top-header {
        padding: 12px 16px;
        left: 0;
        flex-wrap: wrap;
        gap: 12px;
    }

    .header-left {
        flex: 1;
        min-width: 0;
    }

    .top-header h1 {
        font-size: 1.1rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .search-box {
        order: 3;
        flex-basis: 100%;
        max-width: none;
        margin-top: 4px;
    }

    .search-box input {
        padding: 10px 14px 10px 38px;
        font-size: 16px; /* 防止 iOS 自动缩放 */
    }

    .manage-btn-top {
        order: 2;
        margin-left: auto;
        padding: 8px 14px;
        font-size: 0.85rem;
        min-width: 70px;
    }

    .content-wrapper {
        padding: 16px 12px;
        padding-top: 130px;
    }

    .category {
        margin-bottom: 28px;
    }

    .category-title {
        font-size: 1.15rem;
        padding-left: 12px;
        margin-bottom: 16px;
    }

    .category-title .icon {
        font-size: 1.4rem;
    }

    .card-grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 12px;
    }

    .card {
        padding: 12px;
    }

    .card-header {
        gap: 6px;
    }

    .card-icon {
        width: 28px;
        height: 28px;
        font-size: 0.85rem;
    }

    .card-favicon {
        width: 20px;
        height: 20px;
    }

    .card-name {
        font-size: 0.75rem;
    }

    .card-desc {
        font-size: 0.78rem;
        -webkit-line-clamp: 2;
    }

    .card-link {
        font-size: 0.72rem;
    }

    .footer {
        padding: 16px 12px;
        font-size: 0.78rem;
    }
}

/* 小屏手机 */
@media (max-width: 480px) {
    .card-grid {
        grid-template-columns: 1fr;
        gap: 10px;
    }

    .top-header {
        padding: 10px 12px;
    }

    .header-left h1 {
        font-size: 1rem;
    }

    .menu-toggle {
        padding: 8px;
        font-size: 1.5rem;
    }

    .manage-btn-top {
        padding: 7px 12px;
        font-size: 0.8rem;
    }

    .search-box input {
        padding: 9px 12px 9px 36px;
    }

    .content-wrapper {
        padding: 12px 10px;
        padding-top: 125px;
    }

    .category-title {
        font-size: 1.05rem;
        padding-left: 10px;
        margin-bottom: 14px;
    }

    .card {
        padding: 10px;
    }

    .card-name {
        font-size: 0.72rem;
    }

    .card-desc {
        font-size: 0.75rem;
    }

    .card-link {
        font-size: 0.7rem;
    }

    .footer {
        padding: 14px 10px;
        font-size: 0.75rem;
    }

    /* 优化小屏幕上的触摸目标 */
    .nav-link {
        padding: 14px 16px;
    }

    .sidebar-footer p {
        font-size: 0.8rem;
        padding: 8px 0;
    }
}

/* 超小屏幕 */
@media (max-width: 360px) {
    .top-header h1 {
        display: none;
    }

    .card-grid {
        gap: 8px;
    }

    .content-wrapper {
        padding: 10px 8px;
    }
}

/* 横屏模式优化 */
@media (max-height: 500px) and (orientation: landscape) {
    .modal {
        max-height: 90vh;
    }

    .link-list {
        max-height: 250px;
    }

    .content-wrapper {
        padding-top: 80px;
    }

    .sidebar-nav {
        padding: 8px 0;
    }

    .nav-link {
        padding: 10px 16px;
    }
}

/* ==================== 遮罩层（移动端） ==================== */
.sidebar-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 999;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.sidebar-overlay.show {
    display: block;
    opacity: 1;
}

/* ==================== 滚动条美化 ==================== */
::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}

::-webkit-scrollbar-track {
    background: var(--bg-main);
}

::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
    background: #94a3b8;
}

/* ==================== 平滑滚动 ==================== */
html {
    scroll-behavior: smooth;
}

/* ==================== 选中效果 ==================== */
::selection {
    background: var(--primary-color);
    color: white;
}

/* ==================== 焦点样式（可访问性） ==================== */
a:focus-visible,
button:focus-visible,
input:focus-visible,
select:focus-visible {
    outline: 2px solid var(--primary-color);
    outline-offset: 2px;
}

.card:focus-visible {
    outline: 2px solid var(--primary-color);
    outline-offset: -2px;
}

/* ==================== 管理按钮 ==================== */
.manage-btn-top {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    transition: all 0.3s ease;
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    margin-left: 12px;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    min-height: 44px; /* 确保足够的触摸区域 */
}

.manage-btn-top:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
}

.manage-btn-top:active {
    transform: translateY(0);
}

/* ==================== 弹窗样式 ==================== */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    z-index: 9999;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(4px);
}

.modal-overlay.show {
    display: flex;
}

.modal {
    background: white;
    border-radius: 16px;
    width: 90%;
    max-width: 600px;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    animation: modalSlideIn 0.3s ease;
    -webkit-overflow-scrolling: touch; /* iOS 平滑滚动 */
}

@keyframes modalSlideIn {
    from {
        opacity: 0;
        transform: translateY(-30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px;
    border-bottom: 1px solid #e2e8f0;
}

.modal-header h3 {
    margin: 0;
    font-size: 1.2rem;
    color: #1e293b;
}

.modal-close {
    background: none;
    border: none;
    font-size: 1.8rem;
    color: #64748b;
    cursor: pointer;
    line-height: 1;
    transition: color 0.2s;
}

.modal-close:hover {
    color: #ef4444;
}

/* 选项卡 */
.modal-tabs {
    display: flex;
    gap: 0;
    border-bottom: 2px solid #e2e8f0;
}

.tab-btn {
    flex: 1;
    padding: 14px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 600;
    color: #64748b;
    transition: all 0.2s;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
}

.tab-btn.active {
    color: #667eea;
    border-bottom-color: #667eea;
    background: rgba(102, 126, 234, 0.05);
}

.tab-content {
    display: none;
    padding: 24px;
}

.tab-content.active {
    display: block;
}

/* 表单样式 */
.form-group {
    margin-bottom: 18px;
}

.form-group label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
    color: #334155;
    font-size: 0.9rem;
}

.form-group input,
.form-group select {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-size: 0.95rem;
    transition: border-color 0.2s;
}

.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: #667eea;
}

.btn-primary {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
}

/* 网站列表 */
.link-list {
    max-height: 400px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch; /* iOS 平滑滚动 */
}

.delete-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding: 12px;
    background: #f8fafc;
    border-radius: 8px;
    gap: 12px;
    flex-wrap: wrap;
}

.checkbox-label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-weight: 600;
    color: #334155;
    user-select: none;
    min-height: 44px; /* 确保足够的触摸区域 */
    padding: 4px 0;
}

.checkbox-label input[type="checkbox"] {
    width: 20px;
    height: 20px;
    cursor: pointer;
    flex-shrink: 0;
}

.btn-batch-delete {
    background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    transition: all 0.3s;
    opacity: 0.5;
    pointer-events: none;
}

.btn-batch-delete:not(:disabled) {
    opacity: 1;
    pointer-events: auto;
}

.btn-batch-delete:not(:disabled):hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
}

.move-target {
    display: flex;
    align-items: center;
    gap: 8px;
}

.move-target label {
    font-weight: 600;
    color: #334155;
    white-space: nowrap;
}

.move-target select {
    padding: 6px 12px;
    border: 2px solid #e2e8f0;
    border-radius: 6px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: border-color 0.2s;
}

.move-target select:focus {
    outline: none;
    border-color: #667eea;
}

.btn-move {
    background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    transition: all 0.3s;

// ==================== 页面渲染功能 ====================

/**
 * 渲染导航内容
 */
function renderNavigation() {
    const contentDiv = document.getElementById('navigationContent');
    const sidebarMenu = document.getElementById('sidebarMenu');
    const categoryCount = document.querySelector('.sidebar-footer p');
    
    if (!contentDiv || !sidebarMenu) return;
    
    let html = '';
    let menuHtml = '';
    
    NAV_DATA.forEach((category, index) => {
        const categoryId = 'category-' + index;
        
        // 生成侧边栏菜单
        menuHtml += `
            <li>
                <a href="#${categoryId}" class="nav-link" data-target="${categoryId}">
                    <span class="nav-icon">${category.icon}</span>
                    <span class="nav-text">${category.category}</span>
                </a>
            </li>
        `;
        
        // 生成分类内容
        html += `
            <section class="category" id="${categoryId}" data-category="${category.category}">
                <h2 class="category-title">
                    <span class="icon">${category.icon}</span>
                    ${category.category}
                </h2>
                <div class="card-grid">
        `;
        
        category.links.forEach(link => {
            // 提取域名
            let domain = '';
            try {
                const urlObj = new URL(link.url);
                domain = urlObj.hostname;
            } catch (e) {
                domain = link.url;
            }
            
            html += `
                <a href="${escapeHtml(link.url)}" target="_blank" class="card" 
                   data-name="${escapeAttr(link.name)}" 
                   data-desc="${escapeAttr(link.desc)}" 
                   data-url="${escapeAttr(link.url)}">
                    <div class="card-header">
                        <div class="card-icon" data-domain="${domain}">
                            <img class="card-favicon" style="display:none;" alt="${escapeAttr(link.name)}">
                            <span class="card-fallback">${category.icon}</span>
                        </div>
                        <div class="card-info">
                            <div class="card-name">${escapeHtml(link.name)}</div>
                            <div class="card-desc">${escapeHtml(link.desc)}</div>
                            <div class="card-link">${escapeHtml(link.url)}</div>
                        </div>
                    </div>
                </a>
            `;
        });
        
        html += `
                </div>
            </section>
        `;
    });
    
    contentDiv.innerHTML = html;
    sidebarMenu.innerHTML = menuHtml;
    if (categoryCount) {
        categoryCount.textContent = `共 ${NAV_DATA.length} 个分类`;
    }
}

/**
 * HTML 转义
 */
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

/**
 * HTML 属性转义
 */
function escapeAttr(text) {
    return text.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ==================== 图标加载功能 ====================

/**
 * 生成带首字母的彩色图标（Canvas）
 * 每个网站根据域名哈希分配唯一颜色，不依赖任何外部 API
 */
function generateLetterIcon(name, domain) {
    const canvas = document.createElement('canvas');
    canvas.width = 64;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');

    // 20种精选配色
    const colors = [
        '#6366f1', '#8b5cf6', '#ec4899', '#ef4444', '#f97316',
        '#eab308', '#22c55e', '#14b8a6', '#06b6d4', '#3b82f6',
        '#64748b', '#a855f7', '#d946ef', '#f43f5e', '#fb923c',
        '#84cc16', '#10b981', '#0ea5e9', '#7c3aed', '#e11d48'
    ];

    // 根据域名哈希选择固定颜色（确保同一网站颜色始终一致）
    let hash = 0;
    for (let i = 0; i < domain.length; i++) {
        hash = domain.charCodeAt(i) + ((hash << 5) - hash);
    }
    const colorIndex = Math.abs(hash) % colors.length;
    const bgColor = colors[colorIndex];

    // 绘制圆角矩形背景
    ctx.fillStyle = bgColor;
    roundRect(ctx, 0, 0, 64, 64, 14);
    ctx.fill();

    // 绘制网站名称首字母
    const letter = name.trim().charAt(0).toUpperCase();
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 30px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(letter, 32, 34);

    return canvas.toDataURL('image/png');
}

/**
 * 绘制圆角矩形
 */
function roundRect(ctx, x, y, width, height, radius) {
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + width - radius, y);
    ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
    ctx.lineTo(x + width, y + height - radius);
    ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
    ctx.lineTo(x + radius, y + height);
    ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    ctx.closePath();
}

/**
 * 初始化所有卡片图标
 * 直接使用 Canvas 生成，不依赖外部 API
 */
function initCardIcons() {
    const cardIcons = document.querySelectorAll('.card-icon');

    cardIcons.forEach(iconContainer => {
        const domain = iconContainer.getAttribute('data-domain');
        const img = iconContainer.querySelector('.card-favicon');
        const fallback = iconContainer.querySelector('.card-fallback');
        const card = iconContainer.closest('.card');
        const cardName = card ? card.getAttribute('data-name') : '';

        if (!domain || !img) return;

        // 直接生成 Canvas 图标
        const letterIcon = generateLetterIcon(cardName, domain);
        img.src = letterIcon;
        img.style.display = 'block';
        if (fallback) fallback.style.display = 'none';
    });
}

// ==================== 侧边栏导航功能 ====================

/**
 * 初始化侧边栏导航
 */
function initSidebar() {
    const navLinks = document.querySelectorAll('.nav-link');
    const categories = document.querySelectorAll('.category');
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');

    // 创建遮罩层
    const overlay = document.createElement('div');
    overlay.className = 'sidebar-overlay';
    document.body.appendChild(overlay);

    // 点击导航链接
    navLinks.forEach(link => {
        link.addEventListener('click', function(e) {
            e.preventDefault();

            // 移除所有激活状态
            navLinks.forEach(l => l.classList.remove('active'));
            // 添加当前激活状态
            this.classList.add('active');

            // 滚动到对应分类
            const targetId = this.getAttribute('data-target');
            const targetElement = document.getElementById(targetId);

            if (targetElement) {
                targetElement.scrollIntoView({ behavior: 'smooth' });
            }

            // 移动端关闭侧边栏
            if (window.innerWidth <= 768) {
                closeSidebar();
            }
        });
    });

    // 移动端菜单切换
    menuToggle.addEventListener('click', function() {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('show');
    });

    // 点击遮罩层关闭侧边栏
    overlay.addEventListener('click', closeSidebar);

    // 关闭侧边栏
    function closeSidebar() {
        sidebar.classList.remove('open');
        overlay.classList.remove('show');
    }

    // 滚动时更新激活状态
    updateActiveNavOnScroll();
}

/**
 * 滚动时更新侧边栏激活状态
 */
function updateActiveNavOnScroll() {
    const navLinks = document.querySelectorAll('.nav-link');
    const categories = document.querySelectorAll('.category');

    window.addEventListener('scroll', function() {
        let currentCategory = '';

        categories.forEach(category => {
            const categoryTop = category.offsetTop;
            const categoryHeight = category.offsetHeight;

            // 判断当前滚动位置在哪个分类范围内
            if (window.scrollY >= categoryTop - 150) {
                currentCategory = category.id;
            }
        });

        // 更新导航链接的激活状态
        navLinks.forEach(link => {
            link.classList.remove('active');
            if (link.getAttribute('data-target') === currentCategory) {
                link.classList.add('active');
            }
        });
    });
}

            const url = card.getAttribute('data-url').toLowerCase();

            // 检查是否匹配搜索关键词
            if (name.includes(lowerKeyword) ||
                desc.includes(lowerKeyword) ||
                url.includes(lowerKeyword)) {
                card.style.display = 'block';
                categoryHasVisibleCards = true;
                hasResults = true;
            } else {
                card.style.display = 'none';
            }
        });

        // 如果该分类下没有可见卡片，隐藏整个分类
        category.style.display = categoryHasVisibleCards ? 'block' : 'none';
    });

    // 显示或隐藏无结果提示
    const noResultsElement = document.getElementById('noResults');
    if (hasResults) {
        noResultsElement.classList.remove('show');
    } else {
        noResultsElement.classList.add('show');
    }
}

// 页面加载完成后绑定事件
document.addEventListener('DOMContentLoaded', function() {
    // 渲染导航内容
    renderNavigation();
    
    // 初始化侧边栏
    initSidebar();

    // 初始化卡片图标（Canvas 生成首字母彩色图标）
    initCardIcons();

    // 搜索框输入事件（使用防抖优化性能）
    const searchInput = document.getElementById('searchInput');
    let searchTimeout;

    searchInput.addEventListener('input', function(e) {
        // 清除之前的定时器
        clearTimeout(searchTimeout);

        // 延迟300ms执行搜索，避免频繁触发
        searchTimeout = setTimeout(() => {
            searchNavigation(e.target.value);
        }, 300);
    });

    // 支持按 ESC 键清空搜索并关闭侧边栏
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            searchInput.value = '';
            searchNavigation('');
            searchInput.blur();

            // 关闭移动端侧边栏
            const sidebar = document.getElementById('sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            if (sidebar && overlay) {
                sidebar.classList.remove('open');
                overlay.classList.remove('show');
            }
        }
    });

    // 窗口大小改变时重置侧边栏状态
    window.addEventListener('resize', function() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.querySelector('.sidebar-overlay');

        if (window.innerWidth > 768) {
            if (sidebar) sidebar.classList.remove('open');
            if (overlay) overlay.classList.remove('show');
        }
    });
});

// ==================== 网站管理功能 ====================

/**
 * 初始化网站管理功能
 */
function initManageFeature() {
    const manageBtn = document.getElementById('manageBtn');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalClose = document.getElementById('modalClose');
    const tabBtns = document.querySelectorAll('.tab-btn');
    const addForm = document.getElementById('addForm');
    const deleteCategory = document.getElementById('deleteCategory');
    
    if (!manageBtn) return;
    
    // 打开弹窗
    manageBtn.addEventListener('click', async function() {
        modalOverlay.classList.add('show');
        await loadCategories();
        loadLinksForDelete();
        loadLinksForMove();
    });
    
    // 关闭弹窗
    modalClose.addEventListener('click', function() {
        modalOverlay.classList.remove('show');
    });
    
    // 点击遮罩层关闭
    modalOverlay.addEventListener('click', function(e) {
        if (e.target === modalOverlay) {
            modalOverlay.classList.remove('show');
        }
    });
    
    // 选项卡切换
    tabBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            const tab = this.getAttribute('data-tab');
            
            // 更新按钮状态
            tabBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            
            // 显示对应内容
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(tab + 'Tab').classList.add('active');
            
            // 如果切换到删除标签，刷新列表
            if (tab === 'delete') {
                loadLinksForDelete();
            }
            // 如果切换到修改分类标签，刷新列表
            if (tab === 'move') {
                loadLinksForMove();
            }
        });
    });
    
    // 添加网站表单提交
    addForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const category = document.getElementById('addCategory').value;
        const name = document.getElementById('addName').value.trim();
        let url = document.getElementById('addUrl').value.trim();
        const desc = document.getElementById('addDesc').value.trim();
        
        // 自动添加 https:// 前缀
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
            url = 'https://' + url;
        }
        
        try {
            const response = await fetch('/api/add-link', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    category: category,
                    name: name,
                    url: url,
                    desc: desc || name
                })
            });
            
            const result = await response.json();
            
            if (result.success) {
                alert('✅ 添加成功！页面将自动刷新');
                modalOverlay.classList.remove('show');
                setTimeout(() => location.reload(), 500);
            } else {
                alert('❌ 添加失败：' + result.message);
            }
        } catch (error) {
            alert('❌ 网络错误：' + error.message);
        }
    });
    
    // 删除分类改变时刷新列表
    deleteCategory.addEventListener('change', loadLinksForDelete);
    
    // 修改分类的原分类改变时刷新列表
    const moveCategory = document.getElementById('moveCategory');
    if (moveCategory) {
        moveCategory.addEventListener('change', loadLinksForMove);
    }
}

/**
 * 加载所有分类到下拉框
 */
async function loadCategories() {
    try {
        const response = await fetch('/api/categories');
        const categories = await response.json();
        
        const addSelect = document.getElementById('addCategory');
        const deleteSelect = document.getElementById('deleteCategory');
        const moveSelect = document.getElementById('moveCategory');
        const moveTargetSelect = document.getElementById('moveTargetCategory');
        
        // 清空现有选项
        addSelect.innerHTML = '';
        deleteSelect.innerHTML = '';
        if (moveSelect) moveSelect.innerHTML = '';
        if (moveTargetSelect) moveTargetSelect.innerHTML = '';
        
        // 添加选项
        categories.forEach(cat => {
            const option1 = new Option(`${cat.icon} ${cat.name}`, cat.name);
            const option2 = new Option(`${cat.icon} ${cat.name}`, cat.name);
            addSelect.add(option1);
            deleteSelect.add(option2);
            
            if (moveSelect) {
                const option3 = new Option(`${cat.icon} ${cat.name}`, cat.name);
                moveSelect.add(option3);
            }
            if (moveTargetSelect) {
                const option4 = new Option(`${cat.icon} ${cat.name}`, cat.name);
                moveTargetSelect.add(option4);
            }
        });
    } catch (error) {
        console.error('加载分类失败:', error);
    }
}

/**
 * 加载指定分类的网站列表用于删除
 */
async function loadLinksForDelete() {
    const category = document.getElementById('deleteCategory').value;
    const linkList = document.getElementById('linkList');
    const selectAllCheckbox = document.getElementById('selectAll');
    const batchDeleteBtn = document.getElementById('batchDeleteBtn');
    
    // 重置全选状态
    if (selectAllCheckbox) selectAllCheckbox.checked = false;
    if (batchDeleteBtn) {
        batchDeleteBtn.disabled = true;
        document.getElementById('selectedCount').textContent = '0';
    }
    
    if (!category) {
        linkList.innerHTML = '<p style="text-align:center;color:#64748b;padding:20px;">请先选择分类</p>';
        return;
    }
    
    try {
        const response = await fetch(`/api/links?category=${encodeURIComponent(category)}`);
        const links = await response.json();
        
        if (links.length === 0) {
            linkList.innerHTML = '<p style="text-align:center;color:#64748b;padding:20px;">该分类下暂无网站</p>';
            return;
        }
        
        linkList.innerHTML = links.map((link, index) => `
            <div class="link-item" data-index="${index}" data-name="${escapeJs(link.name)}" data-url="${escapeJs(link.url)}">
                <label class="checkbox-label" style="flex: 1;">
                    <input type="checkbox" class="link-checkbox" data-name="${escapeJs(link.name)}" data-url="${escapeJs(link.url)}">
                    <div class="link-info" style="margin-left: 8px;">
                        <div class="link-name">${escapeHtml(link.name)}</div>
                        <div class="link-url">${escapeHtml(link.url)}</div>
                    </div>
                </label>
            </div>
        `).join('');
        
        // 绑定复选框事件
        bindCheckboxEvents();
    } catch (error) {
        console.error('加载网站列表失败:', error);
        linkList.innerHTML = '<p style="text-align:center;color:#ef4444;padding:20px;">加载失败</p>';
    }
}

/**
 * 绑定复选框事件
 */
function bindCheckboxEvents() {
    const selectAllCheckbox = document.getElementById('selectAll');
    const linkCheckboxes = document.querySelectorAll('.link-checkbox');
    const batchDeleteBtn = document.getElementById('batchDeleteBtn');
    const selectedCountSpan = document.getElementById('selectedCount');
    
    // 全选/取消全选
    if (selectAllCheckbox) {
        selectAllCheckbox.addEventListener('change', function() {
            const isChecked = this.checked;
            linkCheckboxes.forEach(checkbox => {
                checkbox.checked = isChecked;
                const linkItem = checkbox.closest('.link-item');
                if (isChecked) {
                    linkItem.classList.add('selected');
                } else {
                    linkItem.classList.remove('selected');
                }
            });
            updateSelectedCount();
        });
    }
    
    // 单个复选框变化
    linkCheckboxes.forEach(checkbox => {
        checkbox.addEventListener('change', function() {
            const linkItem = this.closest('.link-item');
            if (this.checked) {
                linkItem.classList.add('selected');
            } else {
                linkItem.classList.remove('selected');
            }
            
            // 更新全选框状态
            const allChecked = Array.from(linkCheckboxes).every(cb => cb.checked);
            if (selectAllCheckbox) {
                selectAllCheckbox.checked = allChecked;
            }
            
            updateSelectedCount();
        });
    });
    
    // 批量删除按钮
    if (batchDeleteBtn) {
        batchDeleteBtn.addEventListener('click', batchDeleteLinks);
    }
}

/**
 * 更新选中数量
 */
function updateSelectedCount() {
    const linkCheckboxes = document.querySelectorAll('.link-checkbox:checked');
    const selectedCountSpan = document.getElementById('selectedCount');
    const batchDeleteBtn = document.getElementById('batchDeleteBtn');
    
    const count = linkCheckboxes.length;
    if (selectedCountSpan) {
        selectedCountSpan.textContent = count;
    }
    
    if (batchDeleteBtn) {
        batchDeleteBtn.disabled = count === 0;
    }
}

/**
 * 批量删除网站
 */
async function batchDeleteLinks() {
    const category = document.getElementById('deleteCategory').value;
    const selectedCheckboxes = document.querySelectorAll('.link-checkbox:checked');
    
    if (selectedCheckboxes.length === 0) {
        alert('⚠️ 请至少选择一个网站');
        return;
    }
    
    const linksToDelete = Array.from(selectedCheckboxes).map(checkbox => ({
        name: checkbox.getAttribute('data-name'),
        url: checkbox.getAttribute('data-url')
    }));
    
    const confirmMsg = `确定要删除选中的 ${linksToDelete.length} 个网站吗？\n\n` +
        linksToDelete.map(link => `• ${link.name}`).join('\n');
    
    if (!confirm(confirmMsg)) {
        return;
    }
    
    try {
        const response = await fetch('/api/batch-delete-links', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                category: category,
                links: linksToDelete
            })
        });
        
        const result = await response.json();
        
        if (result.success) {
            alert(`✅ 成功删除 ${result.deletedCount} 个网站！页面将自动刷新`);
            setTimeout(() => location.reload(), 500);
        } else {
            alert('❌ 删除失败：' + result.message);
        }
    } catch (error) {
        alert('❌ 网络错误：' + error.message);
    }
}

/**
 * HTML 转义
 */
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

/**
 * JavaScript 字符串转义
 */
function escapeJs(str) {
    return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
}

/**

 */

    const targetCategory = document.getElementById('moveTargetCategory').value;
    const selectedCheckboxes = document.querySelectorAll('.move-link-checkbox:checked');
    
    if (selectedCheckboxes.length === 0) {
        alert('⚠️ 请至少选择一个网站');
        return;
    }
    
    if (sourceCategory === targetCategory) {
        alert('⚠️ 目标分类不能与原分类相同');
        return;
    }
    
    const linksToMove = Array.from(selectedCheckboxes).map(checkbox => ({
        name: checkbox.getAttribute('data-name'),
        url: checkbox.getAttribute('data-url')
    }));
    
    const confirmMsg = `确定要将选中的 ${linksToMove.length} 个网站移动到目标分类吗？\n\n` +
        linksToMove.map(link => `• ${link.name}`).join('\n');
    
    if (!confirm(confirmMsg)) {

    try {
        const response = await fetch('/api/batch-move-links', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                sourceCategory: sourceCategory,
                targetCategory: targetCategory,
                links: linksToMove
            })
        });
        
        const result = await response.json();
        
        if (result.success) {
            alert(`✅ 成功移动 ${result.movedCount} 个网站！页面将自动刷新`);
            setTimeout(() => location.reload(), 500);
        } else {
            alert('❌ 移动失败：' + result.message);
        }
    } catch (error) {
        alert('❌ 网络错误：' + error.message);
    }
}
